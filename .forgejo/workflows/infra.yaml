---
on:
  push:
    branches:
      - main
jobs:
  lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - run: tofu validate
  build-firewall:
    runs-on: self-hosted
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - name: Initialize Firewall repo
        run: tofu init --upgrade
        working-directory: ./Firewall
      - name: Apply Firewall infrastructure
        run: tofu apply -auto-approve -var "role_id=${{ secrets.FIREWALL_ROLE_ID }}"
          -var "secret_id=${{ secrets.FIREWALL_SECRET_ID }}"
        working-directory: ./Firewall
  build-infra:
    runs-on: self-hosted
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - name: Initialize Homelab repo
        run: tofu init --upgrade
        working-directory: ./HomeLab
      - name: Apply Homelab infrastructure
        run: tofu apply -auto-approve -var "role_id=${{ secrets.ROLE_ID }}" -var
          "secret_id=${{ secrets.SECRET_ID }}"
        working-directory: ./HomeLab
